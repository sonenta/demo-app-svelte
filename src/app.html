<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonenta · live i18n demo · Svelte</title>
    <meta
      name="description"
      content="SvelteKit + svelte-i18n showcase: translations served from the Sonenta CDN through a thin app-owned adapter, with live missing-key handling."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sonenta — live i18n demo (Svelte)" />
    <meta
      property="og:description"
      content="Ship in every language. Catch every missing word. The SDK reports every untranslated string the moment a user sees a fallback."
    />
    <meta property="og:image" content="%sveltekit.assets%/og.svg" />
    <meta property="og:url" content="https://sonenta.com/demos/svelte/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sonenta — live i18n demo (Svelte)" />
    <meta
      name="twitter:description"
      content="Translation management with a runtime missing-key handler. MIT, MCP-native, no per-word billing."
    />
    <meta name="twitter:image" content="%sveltekit.assets%/og.svg" />
    <meta name="theme-color" content="#07080b" />
    <link rel="canonical" href="https://sonenta.com/demos/svelte/" />
    <link
      rel="preload"
      href="%sveltekit.assets%/locales/en/common.json"
      as="fetch"
      type="application/json"
      crossorigin="anonymous"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <noscript>
      <div
        style="font-family: ui-sans-serif, system-ui, sans-serif; padding: 32px; max-width: 36rem; margin: 0 auto; color: #e7e9ee; background: #07080b; min-height: 100vh;"
      >
        <h1 style="font-weight: 600; letter-spacing: -0.02em;">Sonenta</h1>
        <p>This live demo of the Sonenta i18n SDK requires JavaScript.</p>
        <p>
          You can still read the docs at
          <a href="https://sonenta.com/docs" style="color: #34d399"
            >sonenta.com/docs</a
          >.
        </p>
      </div>
    </noscript>
  </body>
</html>
